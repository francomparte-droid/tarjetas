<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EFEDE8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;color:#1C1C1C}
.card{width:100%;max-width:400px;background:#fff;border-radius:26px;overflow:hidden;border:1px solid #E8E6E1;box-shadow:0 22px 55px rgba(0,0,0,.12)}
.top{height:6px;background:#ED292B}
.logo{display:block;width:155px;margin:26px auto 0}
.ava-wrap{display:flex;justify-content:center;margin-top:20px}

.name{font-size:24px;font-weight:700;letter-spacing:-.4px;color:#1C1C1C}
.role{color:#ED292B;font-size:12px;font-weight:700;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase}
.company{color:#9A958C;font-size:12px;margin-top:4px}
.actions{padding:20px 24px 6px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:10px}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:13px;font-size:13.5px;font-weight:600;text-decoration:none;transition:transform .12s,opacity .12s;cursor:pointer}
.btn:active{transform:scale(.97);opacity:.88}
.wa{background:#25D366;color:#fff}
.dark{background:#1C1C1C;color:#fff}
.outline{background:#fff;border:1.5px solid #E2DFD8;color:#1C1C1C}
.red{background:#ED292B;color:#fff}
.qrwrap{margin:12px 24px 0;padding:18px;background:#FAF9F6;border:1px solid #ECEAE3;border-radius:18px;display:flex;align-items:center;gap:16px}
.qr{width:90px;height:90px;flex-shrink:0;background:#fff;padding:5px;border-radius:8px}
.qrtxt p:first-child{color:#1C1C1C;font-size:14px;font-weight:700}
.qrtxt p:last-child{color:#9A958C;font-size:11.5px;margin-top:5px;line-height:1.45}
.social{display:flex;justify-content:center;gap:22px;padding:20px 0 6px}
.social a{color:#B5B0A6;transition:color .15s}
.social a:active{color:#ED292B}
.foot{text-align:center;padding:6px 0 22px;font-size:9.5px;color:#C3BEB4;letter-spacing:1.5px}
